<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Chimera Estimator — Kirato Yoshihara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    :root {
      --fg: #1a1a1a;
      --fg-dim: #6b6b6b;
      --bg: #faf9f6;
      --accent: #6495ED;
      --rule: #d4d0c8;
      --serif: 'EB Garamond', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--fg);
      font-size: 1.15rem;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Nav (same as main site) --- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(250,249,246,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
    }
    nav ul {
      display: flex;
      list-style: none;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0.8rem 3rem;
      gap: 2.5rem;
    }
    nav li a {
      font-family: var(--mono);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav li a:hover { color: var(--accent); }
    nav li a.active { color: var(--fg); font-weight: 600; }

    /* --- Article --- */
    article {
      max-width: 680px;
      margin: 0 auto;
      padding: 7rem 2rem 6rem;
    }

    .article-date {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--fg-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .article-title {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0.3rem 0 0.2rem;
    }
    .article-subtitle {
      color: var(--fg-dim);
      font-style: italic;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .article-author {
      font-size: 0.95rem;
      color: var(--fg-dim);
      margin-bottom: 2.5rem;
    }
    .article-author a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .article-author a:hover { border-bottom-color: var(--accent); }

    hr.section-rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2.5rem 0;
    }

    h2 {
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--fg-dim);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.4rem;
      margin-bottom: 1rem;
      margin-top: 2.5rem;
    }

    p { margin-bottom: 1.2rem; }

    a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    a:hover { border-bottom-color: var(--accent); }

    figure {
      margin: 2rem 0;
    }
    figure img {
      width: 100%;
      border-radius: 2px;
    }
    figcaption {
      font-size: 0.88rem;
      color: var(--fg-dim);
      font-style: italic;
      margin-top: 0.5rem;
    }

    pre {
      background: #f0eeea;
      border-radius: 3px;
      padding: 1.2rem;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 1.6;
      margin: 1.5rem 0;
    }

    .citation-box {
      background: #f0eeea;
      border-left: 3px solid var(--accent);
      padding: 1rem 1.2rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 1.7;
      border-radius: 0 3px 3px 0;
      margin: 1.5rem 0;
      user-select: all;
    }

    .back-link {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--fg-dim);
      margin-bottom: 2rem;
    }
    .back-link:hover { color: var(--accent); }

    .katex {
      font-size: 0.95em;
      font-weight: normal;
    }

    @media (max-width: 768px) {
      nav ul { padding: 0.7rem 1.5rem; gap: 1.5rem; }
      article { padding: 5rem 1.5rem 4rem; }
      .article-title { font-size: 1.6rem; }
    }

    /* Allow figures to break out of the 640px column */
    figure.wide {
      width: 100vw;
      max-width: 900px;
      margin-left: 50%;
      transform: translateX(-50%);
    }
    figure.wide img { width: 100%; }
  </style>
</head>

  <body>

  <article>
    <a href="../index.html#page-essays"" class="back-link">← back</a>

    <div class="article-date">date</div>
    <h1 class="article-title">title</h1>
    <p class="article-subtitle">type subtitle here</p>
    <p class="article-author">
      <a href="/kiratoyoshihara.github.io/">Kirato Yoshihara</a>
    </p>


    <h2>Citation</h2>
    <div class="citation-box">
    @misc{yoshihara2026chimera,<br>
    &nbsp;&nbsp;title={The Chimera Estimator: Fixing KL Divergence Gradients in High Dimensions},<br>
    &nbsp;&nbsp;author={Kirato Yoshihara},<br>
    &nbsp;&nbsp;year={2026},<br>
    &nbsp;&nbsp;url={https://kiratoyoshihara.github.io/essays/chimera-kl.html}<br>
    }
    </div>

  </article>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="document.querySelectorAll('.katex-inline').forEach(el => katex.render(el.textContent, el, {throwOnError: false}));"></script>
</body>
</html>
